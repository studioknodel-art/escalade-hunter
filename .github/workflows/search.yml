name: Escalade Hunter

on:
  schedule:
    - cron: "0 0,6,12,18 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  search:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run Escalade search
        env:
          MARKETCHECK_API_KEY: ${{ secrets.MARKETCHECK_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python src/search.py

      - name: Commit updated data files
        run: |
          git config user.name  "escalade-hunter[bot]"
          git config user.email "escalade-hunter[bot]@users.noreply.github.com"
          git add data/seen_listings.json docs/listings.json
          git diff --staged --quiet || git commit -m "chore: update listings"
          git push

  # Deploy the site in the SAME run. Commits made with GITHUB_TOKEN do not
  # trigger the standalone deploy-pages workflow, so we publish here directly.
  deploy:
    needs: search
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main   # pick up the listings the search job just committed
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/
      - id: deployment
        uses: actions/deploy-pages@v4
