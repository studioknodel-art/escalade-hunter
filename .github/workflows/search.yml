name: Escalade Hunter

on:
  schedule:
    # Runs every 6 hours: 12am, 6am, 12pm, 6pm UTC (7pm, 1am, 7am, 1pm Central)
    - cron: "0 0,6,12,18 * * *"
  workflow_dispatch:  # Allows manual trigger from GitHub Actions UI

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  search:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Escalade search
        env:
          MARKETCHECK_API_KEY: ${{ secrets.MARKETCHECK_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python src/search.py

      - name: Commit updated data files
        run: |
          git config user.name  "escalade-hunter[bot]"
          git config user.email "escalade-hunter[bot]@users.noreply.github.com"
          git add data/seen_listings.json docs/listings.json
          git diff --staged --quiet || git commit -m "chore: update listings [skip ci]"
          git push

  deploy-pages:
    needs: search
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main  # pick up the just-committed listings.json

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
