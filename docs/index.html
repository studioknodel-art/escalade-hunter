<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escalade Hunter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#07070c;
    --bg2:#0c0c14;
    --surface:#101019;
    --surface2:#15151f;
    --gold:#FFC03A;
    --gold-bright:#FFD566;
    --gold-deep:#C8922A;
    --red:#FF2440;
    --red-bright:#FF4D66;
    --red-deep:#B3162C;
    --text:#EDEDF5;
    --text2:#9a9ab2;
    --text3:#6a6a82;
    --border:rgba(255,192,58,.16);
    --border-hot:rgba(255,192,58,.45);
    --radius:4px;
    --glow-gold:0 0 18px rgba(255,192,58,.35);
    --glow-red:0 0 18px rgba(255,36,64,.4);
    --font-display:'Orbitron',sans-serif;
    --font-ui:'Rajdhani',sans-serif;
  }
  body{
    font-family:var(--font-ui);
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    background-image:
      radial-gradient(900px 500px at 12% -8%, rgba(255,192,58,.10), transparent 60%),
      radial-gradient(900px 600px at 100% 0%, rgba(255,36,64,.12), transparent 55%),
      linear-gradient(rgba(255,192,58,.028) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,192,58,.028) 1px, transparent 1px);
    background-size:auto, auto, 44px 44px, 44px 44px;
    background-attachment:fixed;
  }

  /* ── Header ── */
  header{
    background:linear-gradient(180deg,#0a0a12,#07070c);
    padding:0 24px;position:sticky;top:0;z-index:50;
    border-bottom:1px solid var(--border-hot);
    box-shadow:0 0 24px rgba(255,36,64,.18), 0 1px 0 rgba(255,192,58,.25);
  }
  .header-inner{max-width:1280px;margin:0 auto;display:flex;align-items:center;gap:16px;height:72px}
  .logo{
    font-family:var(--font-display);font-size:24px;font-weight:900;letter-spacing:1px;
    white-space:nowrap;text-transform:uppercase;
    color:var(--gold);text-shadow:0 0 14px rgba(255,192,58,.55);
  }
  .logo span{
    color:var(--red);text-shadow:0 0 16px rgba(255,36,64,.6);
  }
  .header-meta{font-size:14px;color:var(--text2);margin-left:auto;font-weight:500;letter-spacing:.3px}

  /* ── Collapsible drawers ── */
  .drawer-toggle{display:flex;align-items:center;gap:11px;width:100%;max-width:1280px;margin:0 auto;
    background:none;border:none;cursor:pointer;padding:14px 0;color:var(--gold);
    font-family:var(--font-display);font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;
    text-shadow:0 0 12px rgba(255,192,58,.35)}
  .drawer-toggle:hover{color:var(--gold-bright)}
  .d-ico{width:18px;height:18px;flex:0 0 auto;background:linear-gradient(135deg,var(--gold),var(--red));
    border-radius:2px;clip-path:polygon(0 0,70% 0,100% 30%,100% 100%,30% 100%,0 70%)}
  .d-spacer{flex:1}
  .drawer-meta{font-family:var(--font-ui);font-size:13px;color:var(--text2);font-weight:600;
    text-transform:uppercase;letter-spacing:1px;white-space:nowrap}
  .drawer-meta b{color:var(--gold);font-family:var(--font-display)}
  .chev{flex:0 0 auto;transition:transform .35s cubic-bezier(.22,.61,.36,1);color:var(--gold);display:block}
  .chev.rot{transform:rotate(-90deg)}
  .drawer-body{display:grid;grid-template-rows:1fr;transition:grid-template-rows .38s cubic-bezier(.22,.61,.36,1)}
  .drawer-body.collapsed{grid-template-rows:0fr}
  .drawer-inner{overflow:hidden;min-height:0}

  /* ── Search bar ── */
  .searchbar{
    background:linear-gradient(180deg,rgba(18,18,28,.95),rgba(10,10,18,.95));
    padding:0 24px;border-bottom:1px solid var(--border);
    backdrop-filter:blur(6px);position:sticky;top:72px;z-index:40;
  }
  .searchbar-inner{max-width:1280px;margin:0 auto;display:flex;flex-wrap:wrap;gap:14px;align-items:center;
    padding:4px 0 18px}
  .filter-group,.sort-group{display:flex;flex-direction:column;gap:5px}
  .filter-group label,.sort-group label{
    font-family:var(--font-display);font-size:10px;color:var(--gold);font-weight:500;
    text-transform:uppercase;letter-spacing:1.5px;
  }
  .filter-group select,.sort-group select,.filter-group input[type=range]{
    background:rgba(255,192,58,.06);border:1px solid var(--border-hot);
    color:var(--text);border-radius:var(--radius);padding:7px 10px;
    font-family:var(--font-ui);font-size:14px;font-weight:600;height:38px;min-width:140px;
    transition:box-shadow .15s,border-color .15s;
  }
  .sort-group select{min-width:170px}
  .filter-group select:focus,.sort-group select:focus{
    outline:none;border-color:var(--gold);box-shadow:var(--glow-gold);
  }
  .filter-group select option,.sort-group select option{color:#fff;background:#101019}
  .range-row{display:flex;align-items:center;gap:8px}
  .range-row input[type=range]{min-width:120px;padding:0;height:6px;cursor:pointer;-webkit-appearance:none;appearance:none;
    background:linear-gradient(90deg,var(--red),var(--gold));border:none;border-radius:20px}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:18px;height:18px;border-radius:50%;
    background:var(--gold);border:2px solid #1a1a26;box-shadow:0 0 10px rgba(255,192,58,.8);cursor:pointer}
  input[type=range]::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:var(--gold);
    border:2px solid #1a1a26;box-shadow:0 0 10px rgba(255,192,58,.8);cursor:pointer}
  .range-val{font-size:13px;color:var(--gold-bright);min-width:56px;font-weight:700;font-family:var(--font-display)}
  .results-count{margin-left:auto;color:var(--text2);font-size:14px;white-space:nowrap;font-weight:600;
    text-transform:uppercase;letter-spacing:1px}
  .results-count b{color:var(--gold);font-family:var(--font-display)}

  /* ── Finance bar ── */
  .finance-bar{background:linear-gradient(180deg,rgba(20,14,8,.96),rgba(10,8,5,.96));
    border-bottom:1px solid var(--border);padding:0 24px}
  .finance-inner{max-width:1280px;margin:0 auto;display:flex;flex-wrap:wrap;gap:16px;align-items:flex-end;
    padding-top:4px}
  .finance-title{display:flex;align-items:center;gap:8px;font-family:var(--font-display);
    font-size:13px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:1.5px;
    text-shadow:0 0 12px rgba(255,192,58,.4);padding-bottom:8px;white-space:nowrap}
  .finance-title i{width:18px;height:18px;display:inline-block;
    background:linear-gradient(135deg,var(--gold),var(--red));border-radius:2px;
    clip-path:polygon(0 0,70% 0,100% 30%,100% 100%,30% 100%,0 70%)}
  .fin-group{display:flex;flex-direction:column;gap:5px}
  .fin-group label{font-family:var(--font-display);font-size:9px;color:var(--text2);
    font-weight:500;text-transform:uppercase;letter-spacing:1.2px}
  .fin-input{display:flex;align-items:center;background:rgba(255,192,58,.06);
    border:1px solid var(--border-hot);border-radius:var(--radius);height:38px;
    padding:0 10px;transition:box-shadow .15s,border-color .15s;width:130px}
  .fin-input:focus-within{border-color:var(--gold);box-shadow:var(--glow-gold)}
  .fin-prefix,.fin-suffix{color:var(--gold);font-weight:700;font-family:var(--font-display);font-size:13px}
  .fin-prefix{margin-right:4px}.fin-suffix{margin-left:4px}
  .fin-input input{background:none;border:none;outline:none;color:var(--text);
    font-family:var(--font-ui);font-size:15px;font-weight:700;width:100%;min-width:0;-moz-appearance:textfield}
  .fin-input input::-webkit-outer-spin-button,.fin-input input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .fin-reset{align-self:flex-end;height:38px;padding:0 16px;background:transparent;
    border:1px solid rgba(255,36,64,.35);color:var(--red-bright);border-radius:var(--radius);
    font-family:var(--font-display);font-size:11px;font-weight:700;text-transform:uppercase;
    letter-spacing:1px;cursor:pointer;transition:.15s}
  .fin-reset:hover{background:rgba(255,36,64,.12);box-shadow:var(--glow-red)}
  .finance-note{max-width:1280px;margin:10px auto 0;padding-bottom:14px;font-size:11px;color:var(--text3);letter-spacing:.3px}

  /* Monthly payment block on cards */
  .monthly-row{display:flex;align-items:baseline;gap:8px;background:rgba(255,192,58,.07);
    border:1px solid var(--border-hot);border-radius:var(--radius);padding:7px 11px}
  .monthly-amt{font-family:var(--font-display);font-size:19px;font-weight:900;color:var(--gold-bright);
    text-shadow:0 0 12px rgba(255,192,58,.4)}
  .monthly-lbl{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.6px;font-weight:600}
  .monthly-na{font-size:12px;color:var(--text3);font-style:italic}

  /* ── Main layout ── */
  .main{max-width:1280px;margin:0 auto;padding:28px 24px 60px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:22px}

  /* ── Listing card ── */
  .card{
    background:linear-gradient(180deg,var(--surface),var(--bg2));
    border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;
    display:flex;flex-direction:column;position:relative;
    clip-path:polygon(0 0, calc(100% - 16px) 0, 100% 16px, 100% 100%, 16px 100%, 0 calc(100% - 16px));
    transition:transform .18s, box-shadow .18s, border-color .18s;
  }
  .card::before{content:"";position:absolute;inset:0;pointer-events:none;border-radius:var(--radius);
    box-shadow:inset 0 0 0 1px rgba(255,36,64,.06);}
  .card:hover{transform:translateY(-3px);border-color:var(--border-hot);
    box-shadow:0 0 0 1px var(--border-hot), 0 8px 30px rgba(255,36,64,.18), 0 0 26px rgba(255,192,58,.12)}

  /* Photo section */
  .photo-wrap{position:relative;aspect-ratio:16/10;background:#0a0a12;overflow:hidden;cursor:pointer}
  .photo-track{display:flex;height:100%;width:100%;
    transition:transform .5s cubic-bezier(.22,.61,.36,1)}
  .photo-track.no-anim{transition:none}
  .photo-slide{flex:0 0 100%;width:100%;height:100%;object-fit:cover;display:block;
    filter:saturate(1.05) contrast(1.05);background:#0a0a12}
  .photo-wrap::after{content:"";position:absolute;inset:0;pointer-events:none;z-index:1;
    background:linear-gradient(180deg,rgba(7,7,12,.35) 0%, transparent 22%, transparent 70%, rgba(7,7,12,.55) 100%)}
  .photo-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;
    color:var(--text3);font-size:13px;flex-direction:column;gap:8px;
    background:repeating-linear-gradient(45deg,#0a0a12,#0a0a12 12px,#0e0e18 12px,#0e0e18 24px)}
  .photo-nav{position:absolute;top:50%;transform:translateY(-50%);z-index:3;
    background:rgba(7,7,12,.7);border:1px solid var(--border-hot);color:var(--gold);
    width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:18px;
    display:flex;align-items:center;justify-content:center;transition:.15s}
  .photo-nav:hover{background:var(--gold);color:#0a0a12;box-shadow:var(--glow-gold)}
  .photo-prev{left:10px}
  .photo-next{right:10px}
  .photo-count{position:absolute;bottom:10px;right:10px;z-index:3;background:rgba(7,7,12,.8);
    border:1px solid var(--border);color:var(--gold-bright);font-size:11px;padding:3px 9px;
    border-radius:2px;font-weight:700;font-family:var(--font-display);letter-spacing:.5px}
  .deal-badge{position:absolute;top:12px;left:12px;z-index:3;padding:5px 12px;border-radius:2px;
    font-size:11px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:1px;
    font-family:var(--font-display);border:1px solid rgba(255,255,255,.25);
    box-shadow:0 0 16px rgba(0,0,0,.6), 0 0 14px currentColor}
  .new-badge{position:absolute;top:12px;right:12px;z-index:3;background:var(--red);color:#fff;
    font-size:10px;font-weight:700;padding:4px 10px;border-radius:2px;text-transform:uppercase;
    letter-spacing:1.5px;font-family:var(--font-display);box-shadow:var(--glow-red);
    animation:pulse 1.8s ease-in-out infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 10px rgba(255,36,64,.5)}50%{box-shadow:0 0 22px rgba(255,36,64,.9)}}

  /* Card body */
  .card-body{padding:18px;display:flex;flex-direction:column;gap:11px;flex:1}
  .card-title{font-family:var(--font-display);font-size:17px;font-weight:700;line-height:1.2;
    color:var(--text);letter-spacing:.3px}
  .card-trim{font-size:14px;color:var(--gold);font-weight:600;letter-spacing:.5px;text-transform:uppercase}
  .price-row{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
  .price{font-family:var(--font-display);font-size:26px;font-weight:900;color:var(--gold-bright);
    text-shadow:0 0 16px rgba(255,192,58,.45);letter-spacing:.5px}
  .savings{font-size:13px;color:#4ade80;font-weight:700;text-shadow:0 0 10px rgba(74,222,128,.4)}
  .above-market{font-size:13px;color:var(--red-bright);font-weight:700;text-shadow:0 0 10px rgba(255,77,102,.4)}
  .market-note{font-size:12px;color:var(--text3);letter-spacing:.3px}

  .specs-row{display:flex;gap:18px;flex-wrap:wrap;padding:4px 0;
    border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
  .spec{display:flex;flex-direction:column;gap:2px;padding:6px 0}
  .spec-label{font-size:9px;text-transform:uppercase;letter-spacing:1.2px;color:var(--text3);
    font-weight:700;font-family:var(--font-display)}
  .spec-val{font-size:14px;font-weight:700;color:var(--text)}

  .feature-pills{display:flex;flex-wrap:wrap;gap:7px}
  .pill{font-size:11px;padding:3px 10px;border-radius:2px;font-weight:600;border:1px solid;
    letter-spacing:.4px;text-transform:uppercase}
  .pill-confirmed{background:rgba(255,192,58,.08);color:var(--gold-bright);border-color:var(--border-hot)}
  .pill-warn{background:rgba(154,154,178,.08);color:var(--text2);border-color:rgba(154,154,178,.25)}
  .pill-info{background:rgba(255,36,64,.08);color:var(--red-bright);border-color:rgba(255,36,64,.3)}

  .location-row{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:6px;letter-spacing:.3px}
  .location-row svg{color:var(--red)}
  .radius-tag{font-size:10px;background:rgba(255,36,64,.1);border:1px solid rgba(255,36,64,.3);
    padding:2px 8px;border-radius:2px;color:var(--red-bright);font-weight:700;font-family:var(--font-display)}
  .meta-row{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
  .meta-added{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:5px;font-weight:500;letter-spacing:.3px}
  .meta-added svg{color:var(--gold-deep)}
  .dom-tag{font-size:10px;background:rgba(255,192,58,.08);border:1px solid var(--border-hot);
    color:var(--gold);padding:2px 9px;border-radius:2px;font-weight:700;white-space:nowrap;
    font-family:var(--font-display);letter-spacing:.5px}

  .card-footer{padding:14px 18px;border-top:1px solid var(--border);display:flex;gap:10px;
    background:rgba(0,0,0,.25)}
  .btn{flex:1;padding:10px 0;border-radius:2px;border:none;font-size:13px;font-weight:700;
    cursor:pointer;text-align:center;text-decoration:none;display:inline-block;transition:.15s;
    font-family:var(--font-display);text-transform:uppercase;letter-spacing:1px}
  .btn-primary{background:linear-gradient(135deg,var(--gold),var(--gold-deep));color:#0a0a12;
    box-shadow:0 0 14px rgba(255,192,58,.3)}
  .btn-primary:hover{box-shadow:0 0 22px rgba(255,192,58,.6);transform:translateY(-1px)}
  .btn-secondary{background:transparent;color:var(--gold);border:1px solid var(--border-hot)}
  .btn-secondary:hover{background:rgba(255,192,58,.1);box-shadow:var(--glow-gold)}
  .btn-disabled{background:rgba(154,154,178,.12);color:var(--text3);cursor:default}

  /* Expand details */
  .details{display:none;padding:0 18px 18px;border-top:1px solid var(--border);margin-top:-11px}
  .details.open{display:block}
  .details-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 18px;margin:14px 0 0}
  .detail-row{font-size:12px;display:flex;justify-content:space-between;padding:6px 0;
    border-bottom:1px solid var(--border)}
  .detail-row:last-child{border-bottom:none}
  .detail-key{color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-size:11px}
  .detail-val{font-weight:600;color:var(--text);text-align:right;max-width:60%}
  .description{font-size:12px;color:var(--text2);line-height:1.7;margin-top:14px;padding-top:14px;
    border-top:1px solid var(--border)}
  .expand-btn{background:none;border:none;color:var(--gold);font-size:11px;font-weight:700;
    cursor:pointer;padding:0;margin-top:2px;text-align:left;font-family:var(--font-display);
    text-transform:uppercase;letter-spacing:1px;transition:.15s}
  .expand-btn:hover{color:var(--gold-bright);text-shadow:0 0 8px rgba(255,192,58,.5)}

  /* Empty / loading */
  .empty{text-align:center;padding:80px 24px;color:var(--text2)}
  .empty h2{font-family:var(--font-display);font-size:20px;margin-bottom:8px;color:var(--gold);
    text-transform:uppercase;letter-spacing:1px}
  .empty p{font-size:14px;line-height:1.6}
  .loading{text-align:center;padding:80px;color:var(--gold);font-size:15px;
    font-family:var(--font-display);text-transform:uppercase;letter-spacing:2px;animation:pulse 1.8s infinite}

  /* ── Gallery: mosaic + fullscreen ── */
  .gallery{position:fixed;inset:0;z-index:999;background:rgba(5,5,9,.97);
    backdrop-filter:blur(8px);display:none;opacity:0;transition:opacity .3s ease}
  .gallery.open{display:block;opacity:1}
  .gallery-close{position:fixed;top:18px;right:22px;z-index:1010;color:var(--gold);font-size:30px;
    cursor:pointer;background:rgba(7,7,12,.6);border:1px solid var(--border-hot);border-radius:50%;
    width:46px;height:46px;line-height:1;display:flex;align-items:center;justify-content:center;transition:.15s}
  .gallery-close:hover{background:var(--gold);color:#0a0a12;box-shadow:var(--glow-gold)}

  /* Mosaic grid */
  .gallery-mosaic{position:absolute;inset:0;overflow-y:auto;padding:74px 28px 40px;
    column-width:280px;column-gap:14px;
    transition:opacity .35s ease, transform .35s ease}
  .gallery-mosaic.hidden{opacity:0;transform:scale(.96);pointer-events:none}
  .mosaic-tile{position:relative;overflow:hidden;border-radius:3px;cursor:pointer;
    border:1px solid var(--border);background:#0a0a12;
    break-inside:avoid;margin:0 0 14px;display:block;line-height:0;
    opacity:0;transform:translateY(18px) scale(.96);
    animation:tileIn .45s cubic-bezier(.22,.61,.36,1) forwards}
  @keyframes tileIn{to{opacity:1;transform:none}}
  .mosaic-tile img{width:100%;height:auto;display:block;transition:transform .35s ease}
  .mosaic-tile:hover{border-color:var(--gold);box-shadow:0 0 0 1px var(--border-hot),0 6px 22px rgba(255,36,64,.25)}
  .mosaic-tile:hover img{transform:scale(1.05)}
  .mosaic-title{position:absolute;top:74px;left:28px;right:28px;display:none}

  /* Fullscreen viewer */
  .gallery-full{position:absolute;inset:0;display:none;align-items:center;justify-content:center;
    opacity:0;transform:scale(.82);transition:opacity .32s ease, transform .32s cubic-bezier(.22,.61,.36,1)}
  .gallery-full.show{display:flex;opacity:1;transform:none}
  .gfull-viewport{width:92vw;height:84vh;overflow:hidden;border-radius:4px}
  .gfull-track{display:flex;height:100%;width:100%;transition:transform .5s cubic-bezier(.22,.61,.36,1)}
  .gfull-track.no-anim{transition:none}
  .gfull-slide{flex:0 0 100%;width:100%;height:100%;display:flex;align-items:center;justify-content:center}
  .gfull-slide img{max-width:100%;max-height:100%;object-fit:contain;border-radius:3px;
    box-shadow:0 0 50px rgba(255,192,58,.18)}
  .gfull-nav{position:fixed;top:50%;transform:translateY(-50%);z-index:1010;background:rgba(255,192,58,.1);
    border:1px solid var(--border-hot);color:var(--gold);width:52px;height:52px;border-radius:50%;
    cursor:pointer;font-size:26px;display:flex;align-items:center;justify-content:center;transition:.15s}
  .gfull-nav:hover{background:var(--gold);color:#0a0a12;box-shadow:var(--glow-gold)}
  .gfull-prev{left:18px}.gfull-next{right:18px}
  .gfull-back{position:fixed;top:18px;left:22px;z-index:1010;color:var(--gold);background:rgba(7,7,12,.6);
    border:1px solid var(--border-hot);border-radius:3px;padding:8px 16px;cursor:pointer;
    font-family:var(--font-display);font-size:12px;font-weight:700;text-transform:uppercase;
    letter-spacing:1px;display:flex;align-items:center;gap:7px;transition:.15s}
  .gfull-back:hover{background:var(--gold);color:#0a0a12}
  .gfull-count{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:1010;
    background:rgba(7,7,12,.75);border:1px solid var(--border-hot);color:var(--gold-bright);
    font-family:var(--font-display);font-size:13px;font-weight:700;padding:5px 14px;border-radius:3px;
    letter-spacing:1px}

  @media(max-width:600px){
    .searchbar-inner{gap:10px}
    .filter-group select,.sort-group select,.filter-group input[type=range]{min-width:110px}
    .grid{grid-template-columns:1fr}
    .searchbar{position:static}
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">Escalade <span>Hunter</span></div>

<div class="searchbar">

    <span>Search filters</span>

  </button>
  <div class="drawer-body" id="drawer-search"><div class="drawer-inner">
  <div class="searchbar-inner">

    <div class="filter-group">

      <select id="f-deal" onchange="applyFilters()">
        <option value="">All</option>
        <option value="INBUDGET">In budget only</option>
        <option value="PLATINUM">Platinum</option>

    <div class="filter-group">
      <label>Max miles</label>
      <div class="range-row">
        <input type="range" id="f-miles" min="0" max="75000" step="1000" value="75000" oninput="document.getElementById('miles-val').textContent=Number(this.value).toLocaleString()+'mi';applyFilters()">
        <span class="range-val" id="miles-val">75,000mi</span>

    <div class="filter-group">
      <label>Radius</label>
      <select id="f-radius" onchange="applyFilters()">

    <div class="filter-group">

</div>

<div class="finance-bar">
  <button class="drawer-toggle" id="toggle-finance" aria-expanded="true" onclick="toggleDrawer('finance')">
    <span class="d-ico"></span>
    <span>Finance calculator</span>
    <span class="d-spacer"></span>
    <span class="drawer-meta" id="finance-summary"></span>
    <svg class="chev" id="chev-finance" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>
  </button>
  <div class="drawer-body" id="drawer-finance"><div class="drawer-inner">
  <div class="finance-inner">
    <div class="fin-group">
      <label>Down payment</label>
      <div class="fin-input"><span class="fin-prefix">$</span><input type="number" id="fin-down" min="0" step="500" inputmode="numeric" oninput="onFinanceChange()"></div>
    </div>
    <div class="fin-group">
      <label>Trade-in value</label>
      <div class="fin-input"><span class="fin-prefix">$</span><input type="number" id="fin-trade" min="0" step="500" inputmode="numeric" oninput="onFinanceChange()"></div>
    </div>
    <div class="fin-group">
      <label>Sales tax</label>
      <div class="fin-input"><input type="number" id="fin-tax" min="0" max="15" step="0.01" inputmode="decimal" oninput="onFinanceChange()"><span class="fin-suffix">%</span></div>
    </div>
    <div class="fin-group">
      <label>Interest rate (APR)</label>
      <div class="fin-input"><input type="number" id="fin-rate" min="0" max="30" step="0.1" inputmode="decimal" oninput="onFinanceChange()"><span class="fin-suffix">%</span></div>
    </div>
    <div class="fin-group">
      <label>Term</label>
      <div class="fin-input"><input type="number" id="fin-term" min="12" max="96" step="12" inputmode="numeric" oninput="onFinanceChange()"><span class="fin-suffix">mo</span></div>

<main class="main">

  </div>
</main>

<div class="gallery" id="gallery">

      <div class="gfull-track" id="gfull-track"></div>
    </div>

<script>
let ALL = [];

const DEAL_ORDER = {'PLATINUM':0,'BEST':1,'GOOD':2,'OKAY':3,'ABOVE':4};

/* ── Finance calculator (persisted to localStorage) ───────────────────────── */
const FIN_KEY = 'escaladeHunterFinance';
const FIN_DEFAULTS = { down:0, trade:0, tax:6.25, rate:7.5, term:72 };
let FINANCE = { ...FIN_DEFAULTS };

function loadFinance(){
  try {
    const saved = JSON.parse(localStorage.getItem(FIN_KEY) || '{}');
    FINANCE = { ...FIN_DEFAULTS, ...saved };
  } catch(e){ FINANCE = { ...FIN_DEFAULTS }; }
  document.getElementById('fin-down').value  = FINANCE.down;
  document.getElementById('fin-trade').value = FINANCE.trade;
  document.getElementById('fin-tax').value   = FINANCE.tax;
  document.getElementById('fin-rate').value  = FINANCE.rate;
  document.getElementById('fin-term').value  = FINANCE.term;
  updateFinanceSummary();
}
function readFinanceInputs(){
  const num = (id, def) => {
    const v = parseFloat(document.getElementById(id).value);
    return isFinite(v) && v >= 0 ? v : def;
  };
  FINANCE = {
    down:  num('fin-down',  0),
    trade: num('fin-trade', 0),
    tax:   num('fin-tax',   FIN_DEFAULTS.tax),
    rate:  num('fin-rate',  FIN_DEFAULTS.rate),
    term:  Math.max(1, num('fin-term', FIN_DEFAULTS.term)),
  };
}
function saveFinance(){ localStorage.setItem(FIN_KEY, JSON.stringify(FINANCE)); }
function updateFinanceSummary(){
  const el = document.getElementById('finance-summary');
  if(!el) return;
  const bits = [`${FINANCE.term}mo @ ${FINANCE.rate}% APR`];
  if(FINANCE.down)  bits.push(`$${Math.round(FINANCE.down).toLocaleString()} down`);
  if(FINANCE.trade) bits.push(`$${Math.round(FINANCE.trade).toLocaleString()} trade`);
  el.textContent = bits.join(' · ');
}
function onFinanceChange(){
  readFinanceInputs();
  saveFinance();
  updateFinanceSummary();
  applyFilters();   // re-render cards so every monthly payment updates live
}
function resetFinance(){
  FINANCE = { ...FIN_DEFAULTS };
  saveFinance();
  loadFinance();
  updateFinanceSummary();
  applyFilters();
}

/* ── Collapsible drawers (state persisted to localStorage) ─────────────────── */
function setDrawer(name, collapsed, save){
  const body = document.getElementById('drawer-'+name);
  const chev = document.getElementById('chev-'+name);
  const toggle = document.getElementById('toggle-'+name);
  if(!body) return;
  body.classList.toggle('collapsed', collapsed);
  if(chev)   chev.classList.toggle('rot', collapsed);
  if(toggle) toggle.setAttribute('aria-expanded', String(!collapsed));
  if(save) localStorage.setItem('ehDrawer_'+name, collapsed ? '1' : '0');
}
function toggleDrawer(name){
  const body = document.getElementById('drawer-'+name);
  setDrawer(name, !body.classList.contains('collapsed'), true);
}
function loadDrawers(){
  ['search','finance'].forEach(n =>
    setDrawer(n, localStorage.getItem('ehDrawer_'+n) === '1', false)
  );
}

/* Monthly payment for a given vehicle price using current FINANCE settings.
   Texas-style: trade-in reduces the taxable amount. Returns 0 if nothing to finance. */
function monthlyPayment(price){
  if(!price || price <= 0) return null;
  const taxable   = Math.max(0, price - FINANCE.trade);
  const tax       = taxable * (FINANCE.tax / 100);
  const principal = price + tax - FINANCE.down - FINANCE.trade;
  if(principal <= 0) return 0;                 // paid off by down + trade
  const r = (FINANCE.rate / 100) / 12;
  const n = FINANCE.term;
  if(r === 0) return principal / n;
  return principal * r / (1 - Math.pow(1 + r, -n));
}

function dealColor(label){
  const u = label.toUpperCase();
  if(u.includes('NEAR MISS')) return '#E2724B';
  if(u.includes('PLATINUM')) return '#7B2D8B';
  if(u.includes('BEST'))     return '#00AA44';
  if(u.includes('GOOD'))     return '#3399FF';
  if(u.includes('OKAY'))     return '#FFA500';
  return '#FF3333';
}
function dealKey(label){
  const u = label.toUpperCase();
  if(u.includes('NEAR MISS')) return 'NEARMISS';
  if(u.includes('PLATINUM')) return 'PLATINUM';
  if(u.includes('BEST'))     return 'BEST';
  if(u.includes('GOOD'))     return 'GOOD';
  if(u.includes('OKAY'))     return 'OKAY';
  return 'ABOVE';
}

function fmt$( n){ return n ? '$'+Math.round(n).toLocaleString() : 'N/A'; }
function fmtMi(n){ return n ? Math.round(n).toLocaleString()+' mi' : 'N/A'; }
function fmtPct(n){ return n != null ? (n >= 0 ? '-'+Math.abs(n).toFixed(1)+'%' : '+'+Math.abs(n).toFixed(1)+'%') : ''; }

function fmtDate(iso){
  if(!iso) return '';
  return new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}
function daysAgo(iso){
  if(!iso) return null;
  return Math.max(0, Math.floor((Date.now() - new Date(iso).getTime())/86400000));
}
function agoLabel(iso){
  const d = daysAgo(iso);
  if(d == null) return '';
  if(d === 0) return 'today';
  if(d === 1) return 'yesterday';
  return d + ' days ago';
}
function domLabel(dom){
  if(dom == null) return '';
  if(dom <= 0) return 'just listed';
  if(dom === 1) return '1 day on market';
  return dom + ' days on market';
}

function pill(text, type){
  return `<span class="pill pill-${type}">${text}</span>`;
}

function renderCard(l, idx){
  const photos  = l.photos || [];
  const hasPhotos = photos.length > 0;
  const photoSrc  = hasPhotos ? photos[0] : '';
  const color     = l.deal_color || dealColor(l.deal_label || '');
  const dkey      = dealKey(l.deal_label || '');
  const savings   = l.savings_pct;
  const isNew     = l.first_seen && (Date.now() - new Date(l.first_seen).getTime() < 86400000);

  const slides = hasPhotos
    ? photos.map((p,i)=>`<img class="photo-slide" ${i===0?`src="${p}"`:`data-src="${p}"`} loading="lazy" decoding="async" alt="${l.year} ${l.model} photo ${i+1}">`).join('')
    : '';
  const photoHtml = hasPhotos
    ? `<div class="photo-track" id="track-${idx}" style="transform:translateX(0)" onclick="openGallery(${idx})">${slides}</div>`
    : `<div class="photo-placeholder"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="6" width="18" height="13" rx="2"/><circle cx="8.5" cy="11.5" r="1.5"/><polyline points="21 15 16 10 5 19"/></svg>No photos available</div>`;

  const navHtml = photos.length > 1
    ? `<button class="photo-nav photo-prev" onclick="cardNav(event,${idx},-1)">&#8249;</button>
       <button class="photo-nav photo-next" onclick="cardNav(event,${idx},1)">&#8250;</button>
       <div class="photo-count" id="pc-${idx}">1 / ${photos.length}</div>`
    : '';

  const savingsHtml = l.over_budget
    ? `<span class="above-market">$${Math.round(l.over_budget_amt).toLocaleString()} over budget</span>`
    : (savings != null
        ? (savings >= 0
            ? `<span class="savings">${fmtPct(savings)} vs market</span>`
            : `<span class="above-market">+${Math.abs(savings).toFixed(1)}% above market</span>`)
        : '');

  const scPill  = l.super_cruise
    ? pill('Super Cruise ✓', 'confirmed')
    : pill('Super Cruise – unconfirmed', 'warn');
  const rsePill = l.rear_entertainment
    ? pill('Rear Entertainment ✓', 'confirmed')
    : pill('Rear Displays – unconfirmed', 'warn');
  const drPill  = l.drivetrain ? pill(l.drivetrain, 'info') : '';
  const titlePill = l.title_confirmed
    ? pill('Clean Title ✓', 'confirmed')
    : pill('Title not Carfax-verified', 'warn');
  const prefPill = l.preferred_trim ? pill('Sport Platinum ★', 'info') : '';

  const vdp = l.vdp_url || l.dealer_website || '#';
  const hasVdp = vdp && vdp !== '#';

  const detailPairs = [
    ['VIN',       l.vin],
    ['Year',      l.year],
    ['Mileage',   fmtMi(l.miles)],
    ['Price',     fmt$(l.price)],
    ['Market',    fmt$(l.market_median)],
    ['Exterior',  l.exterior_color],
    ['Interior',  l.interior_color],
    ['Drivetrain',l.drivetrain],
    ['Engine',    l.engine],
    ['Fuel',      l.fuel_type],
    ['Transmission', l.transmission],
    ['Dealer',    l.dealer_name],
    ['Phone',     l.dealer_phone],
    ['Location',  l.city && l.state ? `${l.city}, ${l.state}` : null],
    ['Distance',  l.search_radius ? `${l.search_radius} mi radius` : null],
    ['Added to list', l.first_seen ? `${fmtDate(l.first_seen)} (${agoLabel(l.first_seen)})` : null],
    ['Days on market', l.days_on_market != null ? domLabel(l.days_on_market) : null],
    ['Last confirmed', l.last_seen ? agoLabel(l.last_seen) : null],
  ].filter(([,v]) => v);

  const detailRows = detailPairs.map(([k,v]) =>
    `<div class="detail-row"><span class="detail-key">${k}</span><span class="detail-val">${v}</span></div>`
  ).join('');

  const desc = l.description
    ? `<div class="description">${l.description.slice(0,600)}${l.description.length>600?'…':''}</div>`
    : '';

  const mPay = monthlyPayment(l.price);
  const monthlyHtml = mPay == null
    ? ''
    : `<div class="monthly-row">
         <span class="monthly-amt">${mPay <= 0 ? '$0' : '$' + Math.round(mPay).toLocaleString()}</span>
         <span class="monthly-lbl">/mo est. · ${FINANCE.term}mo @ ${FINANCE.rate}% APR</span>
       </div>`;

  return `
<div class="card" id="card-${idx}" data-photos='${JSON.stringify(photos)}'>
  <div class="photo-wrap" id="pw-${idx}">
    ${photoHtml}
    ${navHtml}
    <div class="deal-badge" style="background:${color}">${l.deal_label || 'Okay Deal'}</div>
    ${isNew ? '<div class="new-badge">New</div>' : ''}
  </div>

  <div class="card-body">
    <div>
      <div class="card-title">${l.year} ${l.make || 'Cadillac'} ${l.model || 'Escalade ESV'}</div>
      <div class="card-trim">${l.trim || ''}</div>
    </div>

    <div class="price-row">
      <span class="price">${fmt$(l.price)}</span>
      ${savingsHtml}
    </div>
    ${l.market_median ? `<div class="market-note">Market median: ${fmt$(l.market_median)}</div>` : ''}

    ${monthlyHtml}

    <div class="specs-row">
      <div class="spec"><span class="spec-label">Miles</span><span class="spec-val">${fmtMi(l.miles)}</span></div>
      <div class="spec"><span class="spec-label">Year</span><span class="spec-val">${l.year || '—'}</span></div>
      <div class="spec"><span class="spec-label">Drivetrain</span><span class="spec-val">${l.drivetrain || '—'}</span></div>
      <div class="spec"><span class="spec-label">Color</span><span class="spec-val">${l.exterior_color || '—'}</span></div>
    </div>

    <div class="feature-pills">
      ${scPill}${rsePill}${titlePill}${drPill}${prefPill}
    </div>

    <div class="location-row">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 1 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      ${l.city || ''}${l.city && l.state ? ', ' : ''}${l.state || ''}
      ${l.dealer_name ? `&nbsp;·&nbsp;${l.dealer_name}` : ''}
      ${l.search_radius ? `<span class="radius-tag">${l.search_radius} mi</span>` : ''}
    </div>

    <div class="meta-row">
      <span class="meta-added"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/></svg>Added ${fmtDate(l.first_seen)}${l.first_seen ? ` (${agoLabel(l.first_seen)})` : ''}</span>
      ${l.days_on_market != null ? `<span class="dom-tag">${domLabel(l.days_on_market)}</span>` : ''}
    </div>

    <button class="expand-btn" onclick="toggleDetails(${idx})">&#9660; View full specs &amp; details</button>
  </div>

  <div class="details" id="det-${idx}">
    <div class="details-grid">${detailRows}</div>
    ${desc}
  </div>

  <div class="card-footer">
    ${hasVdp
      ? `<a href="${vdp}" target="_blank" rel="noopener" class="btn btn-primary">View Listing</a>`
      : `<span class="btn btn-disabled">No link available</span>`}
    <button class="btn btn-secondary" onclick="copyVin('${l.vin||''}',this)">Copy VIN</button>
  </div>
</div>`;
}

let cardPhotoIdx = {};

/* Lazy-hydrate a track slide's image (load it the first time it's needed). */
function hydrateSlide(track, i){
  const img = track.children[i];
  if(img && !img.src && img.dataset.src){ img.src = img.dataset.src; }
}

/* ── Card carousel: horizontal slide ── */
function cardNav(e, idx, dir){
  e.stopPropagation();
  const card   = document.getElementById('card-'+idx);
  const photos = JSON.parse(card.dataset.photos || '[]');
  if(photos.length < 2) return;
  const i = ((cardPhotoIdx[idx] || 0) + dir + photos.length) % photos.length;
  cardPhotoIdx[idx] = i;
  const track = document.getElementById('track-'+idx);
  // hydrate current + neighbours so the slide animates onto a loaded image
  hydrateSlide(track, i);
  hydrateSlide(track, (i+1) % photos.length);
  hydrateSlide(track, (i-1+photos.length) % photos.length);
  track.style.transform = `translateX(${-i*100}%)`;
  const pc = document.getElementById('pc-'+idx);
  if(pc) pc.textContent = (i+1)+' / '+photos.length;
}

/* ── Gallery: mosaic + zoom-to-fullscreen ── */
let GAL = { photos: [], idx: 0 };

function openGallery(cardIdx){
  const card = document.getElementById('card-'+cardIdx);
  GAL.photos = JSON.parse(card.dataset.photos || '[]');
  GAL.idx = cardPhotoIdx[cardIdx] || 0;
  if(!GAL.photos.length) return;

  const mosaic = document.getElementById('gallery-mosaic');
  mosaic.classList.remove('hidden');
  document.getElementById('gallery-full').classList.remove('show');
  // build tiles with a staggered entrance animation
  mosaic.innerHTML = GAL.photos.map((p,i)=>
    `<div class="mosaic-tile" style="animation-delay:${Math.min(i*45,600)}ms" onclick="openFull(${i})">
       <img src="${p}" loading="lazy" decoding="async" alt="Photo ${i+1}">
     </div>`).join('');
  mosaic.scrollTop = 0;

  const g = document.getElementById('gallery');
  g.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeGallery(){
  const g = document.getElementById('gallery');
  g.classList.remove('open');
  document.body.style.overflow = '';
  setTimeout(()=>{ document.getElementById('gfull-track').innerHTML = ''; }, 320);
}

/* Mosaic tile → zoom up to fullscreen viewer */
function openFull(i){
  GAL.idx = i;
  const track = document.getElementById('gfull-track');
  track.classList.add('no-anim');
  track.innerHTML = GAL.photos.map(p=>
    `<div class="gfull-slide"><img src="${p}" decoding="async" alt=""></div>`).join('');
  track.style.transform = `translateX(${-i*100}%)`;
  // force reflow so the no-anim positioning applies before we animate later
  void track.offsetWidth;
  track.classList.remove('no-anim');

  document.getElementById('gallery-mosaic').classList.add('hidden');
  const full = document.getElementById('gallery-full');
  full.classList.add('show');     // triggers the scale-up + fade zoom-in
  updateGalCount();
}

function galNav(dir){
  if(!GAL.photos.length) return;
  GAL.idx = (GAL.idx + dir + GAL.photos.length) % GAL.photos.length;
  document.getElementById('gfull-track').style.transform = `translateX(${-GAL.idx*100}%)`;
  updateGalCount();
}

function updateGalCount(){
  document.getElementById('gfull-count').textContent = (GAL.idx+1)+' / '+GAL.photos.length;
}

function backToMosaic(){
  document.getElementById('gallery-full').classList.remove('show');
  document.getElementById('gallery-mosaic').classList.remove('hidden');
}

function galleryIsOpen(){ return document.getElementById('gallery').classList.contains('open'); }
function fullIsOpen(){ return document.getElementById('gallery-full').classList.contains('show'); }

function toggleDetails(idx){
  const det = document.getElementById('det-'+idx);
  const btn = document.querySelector('#card-'+idx+' .expand-btn');
  det.classList.toggle('open');
  btn.textContent = det.classList.contains('open')
    ? '▲ Hide details'
    : '▼ View full specs & details';
}

function copyVin(vin, btn){
  if(!vin){return;}
  navigator.clipboard.writeText(vin).then(()=>{
    const orig = btn.textContent;
    btn.textContent = 'Copied!';
    setTimeout(()=>btn.textContent=orig, 2000);
  });
}

function applyFilters(){
  const deal   = document.getElementById('f-deal').value;
  const price  = +document.getElementById('f-price').value;
  const miles  = +document.getElementById('f-miles').value;
  const radius = document.getElementById('f-radius').value;
  const sc     = document.getElementById('f-sc').value;
  const sort   = document.getElementById('f-sort').value;

  let list = ALL.filter(l => {
    if(deal === 'INBUDGET'  && l.over_budget) return false;
    else if(deal === 'NEARMISS' && !l.over_budget) return false;
    else if(deal && deal !== 'INBUDGET' && deal !== 'NEARMISS'
            && !dealKey(l.deal_label||'').startsWith(deal)) return false;
    if(l.price > price) return false;
    if(l.miles > miles) return false;
    if(radius && l.search_radius > +radius) return false;
    if(sc === 'confirmed' && !l.super_cruise) return false;
    return true;
  });

  list = list.slice().sort((a,b)=>{
    if(sort==='price-asc')  return a.price - b.price;
    if(sort==='price-desc') return b.price - a.price;
    if(sort==='miles-asc')  return a.miles - b.miles;
    if(sort==='deal')       return (DEAL_ORDER[dealKey(a.deal_label||'')] || 4) - (DEAL_ORDER[dealKey(b.deal_label||'')] || 4);
    return new Date(b.first_seen||0) - new Date(a.first_seen||0);
  });

  document.getElementById('results-count').innerHTML = '<b>' + list.length + '</b> listing' + (list.length!==1?'s':'') + ' on radar';

  const grid = document.getElementById('grid');
  if(!list.length){
    grid.innerHTML = '<div class="empty"><h2>No listings match your filters</h2><p>Try adjusting the filters above, or check back after the next search run.</p></div>';
    return;
  }

  cardPhotoIdx = {};
  grid.innerHTML = list.map((l,i)=>{
    const origIdx = ALL.indexOf(l);
    return renderCard(l, origIdx);
  }).join('');
}

async function loadData(){
  try {
    const r = await fetch('listings.json?_='+Date.now());
    if(!r.ok) throw new Error('HTTP '+r.status);
    ALL = await r.json();
    if(!ALL.length){
      document.getElementById('grid').innerHTML = '<div class="empty"><h2>No listings yet</h2><p>The bot hasn\'t run yet or hasn\'t found any matches. Try triggering a manual run from GitHub Actions.</p></div>';
      document.getElementById('last-updated').textContent = 'No data yet';
      return;
    }
    const latest = ALL.reduce((a,b)=> (a.first_seen||'') > (b.first_seen||'') ? a : b);
    if(latest.first_seen){
      const d = new Date(latest.first_seen);
      document.getElementById('last-updated').textContent = 'Last updated ' + d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit'});
    }
    applyFilters();
  } catch(e){
    document.getElementById('grid').innerHTML = '<div class="empty"><h2>Could not load listings</h2><p>listings.json not found or is empty. Run the bot at least once from GitHub Actions.</p></div>';
    document.getElementById('last-updated').textContent = 'Error loading data';
    console.error(e);
  }
}

document.addEventListener('keydown', e=>{
  if(!galleryIsOpen()) return;
  if(e.key === 'Escape'){
    if(fullIsOpen()) backToMosaic();
    else closeGallery();
  } else if(fullIsOpen() && e.key === 'ArrowRight'){ galNav(1); }
  else if(fullIsOpen() && e.key === 'ArrowLeft'){ galNav(-1); }
});
loadFinance();
loadDrawers();
loadData();
</script>
